<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chickenMain.css">
    <link rel="stylesheet" href="chicken.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="hamburger.jsx"></script>
    <title>Chicken Management</title>
</head>
<body>
    <nav class="menu-bar">
        <h2 class="nav-header">Chicken Management</h2>
        <ul>
            <li><a href="chickenDashboard.html">Dashboard</a></li>
            <li><a href="coop.html">Coop management</a></li>
            <li class="active"><a href="chicken.html" >Chickens</a></li>
        </ul>
        <div class="hamburger" id="hamburger"></div>
    </nav>
    <main>
        <h1>Chicken Management</h1>
        
        <section id="add-chicken">
            <div> 
                <h2 class="h2-90">Add New Chicken <img id="down-arrow" src="images/down arrow sign.svg" alt=""></h2>
            </div>
           
            <form id = "add-chicken-form">
                <label for="chicken-name">Name:</label>
                <input type="text" id="chicken-name" name="chicken-name" required>
                <label for="chicken-rfid">RFID tag number:</label>
                <input type="text" id="chicken-rfid" name="chicken-rfid" required>
                <label for="chicken-gender">Gender:</label>
                <select name="chicken-gender" id="c-gender" required>
                    <option value="">Select gender</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
                <label for="chicken-breed">Breed:</label>
                <input type="text" id="chicken-breed" name="chicken-breed" required>
                <label for="chicken-dob">Date of Birth:</label>
                <input type="date" id="chicken-dob" name="chicken-dob" required>
                <label for="chicken-weight">Weight (kg):</label>
                <input type="number" id="chicken-weight" name="chicken-weight" step="0.01" required>
                <label for="chicken-notes">Notes:</label>
                <textarea id="chicken-notes" name="chicken-notes"></textarea>
                <label for="chicken-photo">Photo:</label>
                <input type="file" id="chicken-photo" name="chicken-photo" accept="image/*">
                <button type="submit">Add Chicken</button>
            </form>
            
        </section>
        
        <section id = "eggs-layed">
            <div>
                <h2 class="h2-90">Log Eggs Collected</h2>
            </div>
            
        <form id = "log-eggs-form">
                <label for="log-chicken-name">Name:</label>
                <select name="log-chicken-name" id="log-chicken-name" required>
                    <option value="">Select a chicken</option>
                </select>
                <label for="eggs-date">Date Laid:</label>
                <input type="datetime" id="eggs-date" name="eggs-date" required>
                <label for="chicken-eggs">Eggs Laid:</label>
                <input type="number" id="chicken-eggs" name="chicken-eggs" required>
                <button type="submit">Log Eggs</button>
            </form>

        </section>

        <section id = "chicken-list">
            <div>
                <h2 class="h2-90">Your Chickens</h2>
                <hr>
            </div>
            <p id = "no-chickens">No chickens registered yet. Add one to get started!</p>
        </section>
        </main> 
</body>
</html>
